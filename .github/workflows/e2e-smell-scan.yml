name: E2E Skills CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e-skills-ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install ast-grep
        run: npm i -g '@ast-grep/cli@^0.39'

      - name: Run convention and security checks
        shell: bash
        env:
          E2E_SKILLS_SKIP_SECURITY: "1"
          E2E_SKILLS_SKIP_SMELL_SCAN: "1"
        run: bash scripts/ci/ci-local.sh

      - name: Run E2E smell scanner (auto-uses eslint plugins, ast-grep, regex)
        shell: bash
        env:
          E2E_SMELL_FAIL_ON: p0
        run: |
          set -o pipefail
          ./skills/e2e-reviewer/scripts/scan.sh . | tee e2e-smell-report.txt

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-smell-report
          path: e2e-smell-report.txt

      - name: Add job summary
        if: always()
        shell: bash
        run: |
          {
            echo '## E2E Smell Scan'
            echo
            if [ -f e2e-smell-report.txt ]; then
              echo '```text'
              cat e2e-smell-report.txt
              echo '```'
            else
              echo 'Scan report was not generated because an earlier CI step failed.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Pre-push security gate
        shell: bash
        run: bash scripts/ci/pre-push-security.sh
