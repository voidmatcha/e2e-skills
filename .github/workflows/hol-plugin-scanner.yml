name: HOL Plugin Scanner

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: HOL Plugin Scanner
        uses: hashgraph-online/ai-plugin-scanner-action@42795404216334c58194939eb07c64094f21ef7c # v1 / v1.2.188
        with:
          plugin_dir: "."
          mode: scan
          min_score: 80
          fail_on_severity: high
          format: sarif
          upload_sarif: true
